name: Reusable verification

on:
  workflow_call:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        output-locale: [en, zh-CN]
    runs-on: ${{ matrix.os }}
    env:
      HORSEPOWER_E2E_LOCALE: ${{ matrix.output-locale }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - run: npm ci
      - name: Install the supported official OpenSpec CLI
        run: |
          npm install --global @fission-ai/openspec@1.6.0
          test "$(openspec --version)" = "1.6.0"
      - run: npm run check
      - name: Build and scan deterministic release
        run: npm run release
